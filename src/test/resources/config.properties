test.platform=mobile
cucumber.tags=@android

# ============================================
# MOBILE CONFIGURATION
# ============================================

mobile.platform.name=Android
mobile.automation.name=UiAutomator2

mobile.device.name=Pixel 7a
mobile.udid=33101JEHN18985
mobile.platform.version=15

# ============================================
# APP CONFIGURATION
# ============================================

mobile.app.package=com.hubblehox.hubbleorion
mobile.app.activity=com.hubblehox.hubbleorion.MainActivity
mobile.app.wait.activity=*

# If using APK directly uncomment below
 mobile.apk.path=

# ============================================
# APPIUM
# ============================================

mobile.appium.server.url=http://127.0.0.1:4723

mobile.implicit.wait=20
mobile.explicit.wait=25
mobile.new.command.timeout=300

mobile.no.reset=true
mobile.full.reset=false
mobile.auto.grant.permissions=true

mobile.skip.unlock=true
mobile.ignore.hidden.api.policy=true

mobile.screenshot.path=target/mobile-screenshots/

